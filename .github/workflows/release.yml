name: release

# Tag a version to publish:  git tag v0.1.2 && git push origin v0.1.2
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # create the GitHub Release
  pages: write      # deploy the apt/yum repo to GitHub Pages
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build .deb and .rpm
        run: |
          set -eu
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s/^version:.*/version: \"${VERSION}\"/" packaging/nfpm.yaml
          chmod +x bin/alabofur
          mkdir -p dist
          nfpm package -f packaging/nfpm.yaml -p deb -t dist
          nfpm package -f packaging/nfpm.yaml -p rpm -t dist
          # source/binary tarball as a third asset
          tar czf "dist/alabofur-${VERSION}.tar.gz" \
            bin lib share Makefile packaging README.md LICENSE 2>/dev/null || \
          tar czf "dist/alabofur-${VERSION}.tar.gz" bin lib share Makefile packaging README.md
          ls -l dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz

  pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Install repo tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils createrepo-c gnupg

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Build signed apt + yum repositories
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: sh packaging/build-repo.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
