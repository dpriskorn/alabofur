name: alabofur
title: alabofur
base: core24
version: '1.0.0'
summary: Simple bandwidth shaper with a ufw-like UX
description: |
  alabofur caps per-interface upload/download speeds and ships a systemd
  service so the limits persist across reboot, with a ufw-like command UX.
license: MIT
grade: stable

# The tool runs tc/ip, loads the ifb kernel module and writes a systemd unit,
# so it needs full system access -> classic confinement (manual store review).
confinement: classic

parts:
  alabofur:
    plugin: dump
    source: .
    stage:
      - bin/alabofur
      - lib/alabofur/common
      - lib/alabofur/config
      - lib/alabofur/tc
      - share/alabofur/alabofur.service
      - share/man/man1/alabofur.1

apps:
  alabofur:
    # bin/alabofur finds its libs via <bindir>/../lib, which resolves correctly
    # inside the snap ($SNAP/bin -> $SNAP/lib/alabofur).
    command: bin/alabofur
